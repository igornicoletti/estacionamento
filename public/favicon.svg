    <linearGradient id="mc-grad" gradientUnits="userSpaceOnUse"
                    x1="14.90" y1="70.23" x2="83.27" y2="29.54">
      <stop offset="0"   stop-color="#0556B3"/>
      <stop offset="0.5" stop-color="#1192DD"/>
      <stop offset="1"   stop-color="#22BFF5"/>
    </linearGradient>
  </defs>
  <g fill="url(#mc-grad)" transform="translate(14.90 29.54) scale(0.9796)">
