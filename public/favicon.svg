<svg xmlns="http://www.w3.org/2000/svg" viewBox="9 23.6 82 53" shape-rendering="geometricPrecision">
  <!--
    Símbolo Monte Carlo — favicon.
    Geometria interna (raios, posições, gradiente) preservada conforme manual da marca.
    Apenas o viewBox foi recortado ao bounding box real (80x50.7) com ~1u de respiro
    para antialiasing, eliminando o padding excessivo no preview da aba do navegador.
  -->
