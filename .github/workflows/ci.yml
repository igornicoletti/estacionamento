name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck app
        run: pnpm typecheck

      - name: Typecheck tests
        run: pnpm typecheck:test

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Check Supabase functions
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            deno check "$file"
          done < <(find supabase/functions -mindepth 2 -maxdepth 2 -name index.ts -not -path '*/_shared/*' -print0)
